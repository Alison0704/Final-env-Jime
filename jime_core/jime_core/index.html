<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JIM-E Robot Face</title>
    <script src="https://cdn.jsdelivr.net/npm/eventemitter2@6.4.4/lib/eventemitter2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
    <style>
        :root {
            --eye-color: #00f5d4; 
            --bg-color: #000000;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Breathing Animation --- */
        .face-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            z-index: 2;
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* --- Camera Background --- */
        #camera-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none; 
            z-index: 1;
            background: black;
        }

        #camera-feed {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* --- Robot Eyes --- */
        .eyes-row {
            display: flex;
            gap: 110px;
        }

        .eye {
            width: 160px;
            height: 160px;
            border: 12px solid var(--eye-color);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 35px var(--eye-color), inset 0 0 15px var(--eye-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.1s ease-out; /* For blinking */
        }

        .pupil {
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: var(--eye-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--eye-color);
            transform: translateX(0);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Symmetrical Movement Classes */
        .look-left .pupil { transform: translateX(-38px); }
        .look-right .pupil { transform: translateX(38px); }
        .is-blinking .eye { transform: scaleY(0); }

        /* --- Mouth --- */
        .mouth {
            width: 90px;
            height: 42px;
            background-color: var(--eye-color);
            border-radius: 8px 8px 45px 45px; 
            box-shadow: 0 0 25px var(--eye-color);
            transition: transform 0.2s ease;
        }

        .is-talking .mouth {
            animation: talk-pulse 0.25s infinite alternate ease-in-out;
        }

        @keyframes talk-pulse {
            from { transform: scaleY(1); }
            to { transform: scaleY(0.4); }
        }

        /* --- UI Overlay --- */
        #ui-overlay {
            position: fixed;
            bottom: 12%;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 3;
        }

        #greeting-text {
            display: none;
            color: #00d4ff;
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid var(--eye-color);
        }

        .btn-yes {
            display: none;
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(145deg, #00f5d4, #00a896);
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,245,212,0.3);
            cursor: pointer;
            color: black;
        }

        #start-gate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 24px;
            cursor: pointer;
            color: var(--eye-color);
        }

        #status {
            position: fixed; top: 10px; left: 10px;
            font-size: 12px; color: #555; z-index: 101;
        }
    </style>
</head>
<body onclick="enableFullscreen()">

    <div id="start-gate">TAP SCREEN TO WAKE UP JIM-E</div>
    <div id="status">Connecting...</div>

    <div id="camera-container">
        <img id="camera-feed" src="">
    </div>

    <div id="face-main" class="face-wrapper">
        <div class="eyes-row">
            <div class="eye" id="eyeL"><div class="pupil"></div></div>
            <div class="eye" id="eyeR"><div class="pupil"></div></div>
        </div>
        <div class="mouth" id="mouth-main"></div>
    </div>

    <div id="ui-overlay">
        <div id="greeting-text">"Hello! Need a table?"</div>
        <button id="yesBtn" class="btn-yes" onclick="sendYes(event)">YES, PLEASE!</button>
    </div>

    <script>
        const pi_ip = window.location.hostname; 
        const ros = new ROSLIB.Ros({ url: 'ws://' + pi_ip + ':9090' });

        ros.on('connection', () => { document.getElementById('status').innerText = 'Connected'; });
        ros.on('error', () => { document.getElementById('status').innerText = 'Connection Error'; });

        const uiPub = new ROSLIB.Topic({ ros: ros, name: '/ui_interaction', messageType: 'std_msgs/String' });
        const faceSub = new ROSLIB.Topic({ ros: ros, name: '/robot_face', messageType: 'std_msgs/String' });

        faceSub.subscribe((msg) => {
            const face = document.getElementById('face-main');
            const camCont = document.getElementById('camera-container');
            const camImg = document.getElementById('camera-feed');
            const greet = document.getElementById('greeting-text');
            const yesBtn = document.getElementById('yesBtn');
            const mouth = document.getElementById('mouth-main');
            const streamUrl = "http://" + pi_ip + ":8080/stream?topic=/camera_processed_image&type=mjpeg";

            // Reset States
            greet.style.display = "none";
            yesBtn.style.display = "none";
            face.classList.remove('look-left', 'look-right', 'is-talking');

            switch(msg.data) {
                case "SEARCHING_EYES":
                    face.style.display = "flex";
                    camCont.style.display = "none";
                    camImg.src = ""; 
                    break;

                case "LOOK_LEFT":
                    face.style.display = "flex";
                    face.classList.add('look-left');
                    break;

                case "LOOK_RIGHT":
                    face.style.display = "flex";
                    face.classList.add('look-right');
                    break;

                case "TALKING":
                    face.style.display = "flex";
                    face.classList.add('is-talking');
                    break;

                case "SHOW_FEED":
                    face.style.display = "none"; 
                    camCont.style.display = "block";
                    if (camImg.src !== streamUrl) camImg.src = streamUrl;
                    break;

                case "SHOW_UI_BUTTONS":
                    face.style.display = "flex";
                    camCont.style.display = "none";
                    greet.style.display = "block"; 
                    yesBtn.style.display = "block";
                    break;
            }
        });

        function triggerBlink() {
            const face = document.getElementById('face-main');
            face.classList.add('is-blinking');
            setTimeout(() => face.classList.remove('is-blinking'), 150);
        }

        // Auto-blink loop
        setInterval(() => {
            if (Math.random() > 0.7) triggerBlink();
        }, 3000);

        function sendYes(event) {
            event.stopPropagation();
            uiPub.publish(new ROSLIB.Message({ data: "YES" }));
            document.getElementById('yesBtn').innerText = "SHOWING THE WAY...";
            setTimeout(() => {
                document.getElementById('yesBtn').style.display = "none";
                document.getElementById('greeting-text').style.display = "none";
            }, 2000);
        }

        function enableFullscreen() {
            document.getElementById('start-gate').style.display = 'none';
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
